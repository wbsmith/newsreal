version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -E '^(BEDROCK_|UPSTASH_|DYNAMODB_|ANTHROPIC_|CRON_SECRET|NEWSREAL_|NEXT_PUBLIC_|ADMIN_)' >> .env.production
        - npm run build
        - cp .env.production .next/.env.production
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
