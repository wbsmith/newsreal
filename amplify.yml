version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - node -e "Object.entries(process.env).filter(([k])=>/^(ANTHROPIC_API_KEY|CRON_SECRET|NEWSREAL_|NEXT_PUBLIC_|ADMIN_)/.test(k)).forEach(([k,v])=>console.log(k+'=\"'+v+'\"'))" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
