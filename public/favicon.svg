        fill="none" stroke="#c62828" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Iris -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#c62828" stroke-width="2"/>

  <!-- Pupil -->
  <circle cx="32" cy="32" r="5" fill="#c62828"/>
  <circle cx="32" cy="32" r="5" fill="#0a0a0c" opacity="0.5"/>

  <!-- Glint -->
  <circle cx="35" cy="29" r="1.8" fill="#ff1744" opacity="0.6"/>
  <circle cx="36" cy="28" r="0.8" fill="#fff" opacity="0.5"/>
</svg>
